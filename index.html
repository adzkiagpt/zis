<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZISWAF Admin - Lembaga Zakat Modern</title>
    <link rel="stylesheet" href="/src/index.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-slate-50 text-slate-900 font-sans overflow-hidden">
    <div class="flex h-screen">
        <!-- Sidebar -->
        <aside id="sidebar" class="w-64 bg-white border-r border-slate-200 flex flex-col transition-all duration-300">
            <div class="p-6 flex items-center gap-3 border-b border-slate-100">
                <div class="w-10 h-10 bg-emerald-600 rounded-xl flex items-center justify-center text-white shrink-0">
                    <i data-lucide="target"></i>
                </div>
                <div class="sidebar-text overflow-hidden">
                    <h1 class="font-bold text-lg text-slate-800 leading-tight">ZISWAF</h1>
                    <p class="text-xs text-slate-500">Admin Panel v1.0</p>
                </div>
            </div>

            <nav id="sidebar-nav" class="flex-1 px-4 py-4 space-y-1 overflow-y-auto">
                <!-- Menu akan di-render oleh JS -->
            </nav>

            <div class="p-4 border-t border-slate-100">
                <button id="btn-logout" class="w-full flex items-center gap-3 px-4 py-3 rounded-lg text-red-500 hover:bg-red-50 transition-colors">
                    <i data-lucide="log-out"></i>
                    <span class="font-medium sidebar-text">Keluar</span>
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 flex flex-col overflow-hidden">
            <!-- Header -->
            <header class="h-16 bg-white border-b border-slate-200 flex items-center justify-between px-6 shrink-0 z-10">
                <div class="flex items-center gap-4">
                    <button id="btn-toggle-sidebar" class="p-2 hover:bg-slate-100 rounded-lg text-slate-600">
                        <i data-lucide="menu"></i>
                    </button>
                    <h2 id="page-title" class="text-xl font-semibold text-slate-800">Dashboard</h2>
                </div>

                <div class="flex items-center gap-4">
                    <div class="flex items-center gap-3">
                        <div class="text-right hidden sm:block">
                            <p class="text-sm font-medium text-slate-800">Super Admin</p>
                            <p class="text-xs text-slate-500">akrom.ach@gmail.com</p>
                        </div>
                        <div class="w-10 h-10 bg-slate-200 rounded-full border-2 border-white shadow-sm overflow-hidden">
                            <img src="https://picsum.photos/seed/admin/100/100" alt="User" referrerPolicy="no-referrer">
                        </div>
                    </div>
                </div>
            </header>

            <!-- Content Area -->
            <div id="app-content" class="flex-1 overflow-y-auto p-6">
                <div class="flex items-center justify-center h-full">
                    <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-emerald-600"></div>
                </div>
            </div>
        </main>
    </div>

    <script type="module" src="/src/main.js"></script>
</body>
</html>
